<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile | KMPilot Gold</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: '#0F0D09',
                        surface: '#1C1910',
                        'surface-variant': '#302B1C',
                        'on-surface': '#EDE8D5',
                        'on-surface-variant': '#C4BA94',
                        outline: '#726A48',
                        'outline-variant': '#3F3822',
                        primary: '#F5D76E',
                        'on-primary': '#2C1900',
                        'primary-container': '#4A3200',
                        'on-primary-container': '#FFF0C0',
                        error: '#FFB4AB',
                        'on-error': '#690005',
                        'error-container': '#93000A',
                        'on-error-container': '#FFDAD6',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        'full': '9999px'
                    },
                    fontFamily: {
                        headline: ["Manrope", "sans-serif"],
                        display: ["Manrope", "sans-serif"],
                        body: ["Manrope", "sans-serif"],
                        label: ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #0F0D09;
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .premium-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar from Shared Components Mapping -->
<header class="fixed top-0 z-50 w-full h-16 flex items-center px-4 bg-background/80 premium-blur sticky">
<div class="flex items-center w-full gap-4">
<button class="material-symbols-outlined text-primary text-2xl active:scale-95 transition-transform">
                arrow_back
            </button>
<h1 class="font-headline text-on-surface font-bold text-xl">Profile</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-32 px-6 flex flex-col">
<!-- Avatar Section -->
<section class="mt-8 flex flex-col items-center">
<div class="relative">
<div class="w-20 h-20 rounded-full bg-surface-variant border border-primary flex items-center justify-center overflow-hidden">
<span class="font-headline text-primary font-bold text-2xl">AJ</span>
</div>
<!-- Premium subtle glow behind avatar -->
<div class="absolute inset-0 -z-10 bg-primary/10 blur-xl rounded-full scale-125"></div>
</div>
<h2 class="mt-3 text-on-surface font-bold text-xl font-headline tracking-tight">Alex Johnson</h2>
<p class="mt-1 text-on-surface-variant text-sm font-body">alex@example.com</p>
</section>
<!-- Account Details Card -->
<section class="mt-6">
<div class="bg-surface border border-outline-variant rounded-xl p-5 shadow-sm">
<h3 class="text-on-surface-variant font-label text-xs font-semibold uppercase tracking-widest mb-2">
                    ACCOUNT DETAILS
                </h3>
<!-- Row 1: Name -->
<div class="py-4 flex flex-col gap-1">
<span class="text-on-surface-variant text-[10px] font-label uppercase tracking-wider">Name</span>
<span class="text-on-surface text-base font-body font-medium">Alex Johnson</span>
</div>
<!-- Divider -->
<div class="h-px w-full bg-outline-variant"></div>
<!-- Row 2: Email -->
<div class="py-4 flex flex-col gap-1">
<span class="text-on-surface-variant text-[10px] font-label uppercase tracking-wider">Email</span>
<span class="text-on-surface text-base font-body font-medium">alex@example.com</span>
</div>
<!-- Row 3: Account ID (Extra context for Fintech feel) -->
<div class="h-px w-full bg-outline-variant"></div>
<div class="py-4 flex flex-col gap-1">
<span class="text-on-surface-variant text-[10px] font-label uppercase tracking-wider">Member Tier</span>
<div class="flex items-center gap-2">
<span class="text-primary material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-primary text-base font-headline font-semibold">Gold Private Banking</span>
</div>
</div>
</div>
</section>
<!-- Security & Preferences (Additional UI depth) -->
<section class="mt-4">
<div class="bg-surface border border-outline-variant rounded-xl p-5">
<h3 class="text-on-surface-variant font-label text-xs font-semibold uppercase tracking-widest mb-4">
                    PREFERENCES
                </h3>
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">shield</span>
<span class="text-on-surface font-body">Biometric Security</span>
</div>
<div class="w-10 h-6 bg-primary rounded-full flex items-center px-1">
<div class="w-4 h-4 bg-on-primary rounded-full translate-x-4"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Section -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background to-transparent pt-12">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl flex items-center justify-center gap-2 font-headline font-bold text-base active:scale-[0.98] transition-all hover:opacity-90">
<span class="material-symbols-outlined text-xl">edit</span>
            Edit Profile
        </button>
</div>
<!-- Script for subtle interactive states -->
<script>
        document.querySelectorAll('button, .bg-surface').forEach(el => {
            el.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            el.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });
    </script>
</body></html>

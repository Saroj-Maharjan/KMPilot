<style>

        .shimmer-glow {

            background: linear-gradient(90deg, #EDE8D5 0%, #F5D76E 50%, #EDE8D5 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }
        .glass-footer {
            background: rgba(15, 13, 9, 0.8);

<style>

</head>

</main>
<!-- Review Footer -->
<footer class="fixed bottom-0 left-0 w-full glass-footer p-6 z-50">
<div class="max-w-lg mx-auto">
<button class="w-full h-14 bg-primary text-on-primary font-bold text-lg rounded-3xl shadow-gold-glow hover:shadow-gold-intense active:scale-[0.98] transition-all duration-300">
                Review Swap
            </button>
</div>
</footer>
<!-- Bottom Navigation Bar (Contextual Suppression Logic Applied) -->
<!-- Navigation hidden for transactional focused screen "Review Swap" as per JSON/UX mandates -->
<script>
        // Simple micro-interaction for input field
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', (e) => {
                e.target.closest('section').classList.add('border-primary/50');
            });
            input.addEventListener('blur', (e) => {
                e.target.closest('section').classList.remove('border-primary/50');
            });
        });

        // Add subtle animation for the "To" amount glow on click
        const shimmerEl = document.querySelector('.shimmer-glow');
        shimmerEl.addEventListener('click', () => {
            shimmerEl.style.animation = 'none';
            setTimeout(() => {
                shimmerEl.style.animation = 'shimmer 1.5s infinite linear';
            }, 10);
        });
    </script>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KMPilot - Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'background': '#0F0D09',
                        'surface': '#1C1910',
                        'surface-variant': '#302B1C',
                        'on-surface': '#EDE8D5',
                        'on-surface-variant': '#C4BA94',
                        'outline': '#726A48',
                        'outline-variant': '#3F3822',
                        'primary': '#F5D76E',
                        'on-primary': '#2C1900',
                        'primary-container': '#4A3200',
                        'on-primary-container': '#FFF0C0',
                        'error': '#FFB4AB',
                        'on-error': '#690005',
                        'error-container': '#93000A',
                        'on-error-container': '#FFDAD6',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        'full': '9999px',
                        '2xl': '20px',
                    },
                    fontFamily: {
                        'headline': ['Manrope', 'sans-serif'],
                        'display': ['Manrope', 'sans-serif'],
                        'body': ['Manrope', 'sans-serif'],
                        'label': ['Manrope', 'sans-serif'],
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0F0D09;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased">
<!-- 
        Main Canvas: Full-screen centered loading state.
        In accordance with the Shell Visibility & Relevance mandate, 
        TopAppBar and BottomNavBar are suppressed for this focused, task-based loading screen.
    -->
<main class="relative h-screen w-screen flex flex-col items-center justify-center bg-background p-6">
<!-- Loading Container -->
<div class="relative flex items-center justify-center">
<!-- Exterior Decorative Ring (Subtle Glow) -->
<div class="absolute w-24 h-24 rounded-full border border-outline-variant/30 blur-sm"></div>
<!-- Background Track for the circular indicator -->
<div class="w-16 h-16 rounded-full border-4 border-surface-variant"></div>
<!-- Champagne Gold Progress Indicator -->
<!-- We use a partial border to simulate a modern loading arc without CSS animation -->
<div class="absolute w-16 h-16 rounded-full border-4 border-transparent border-t-primary border-r-primary/40 rotate-45"></div>
<!-- Central Brand Identity Detail -->
<div class="absolute w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(245,215,110,0.6)]"></div>
</div>
<!-- Optional Branding Anchor Layer (Silent/Subtle) -->
<div class="absolute bottom-12 left-0 w-full flex justify-center opacity-10 pointer-events-none">
<div class="w-12 h-1 bg-gradient-to-r from-transparent via-primary to-transparent rounded-full"></div>
</div>
</main>
<!-- 
        Background Visual Context: 
        Hidden texture layer to maintain the "Digital Luxury" feel. 
    -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-variant/20 via-background to-background"></div>
</div>
</body></html>

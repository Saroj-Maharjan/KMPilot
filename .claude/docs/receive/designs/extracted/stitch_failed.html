<div class="flex flex-col items-center text-center max-w-[280px]">
<div class="w-24 h-24 mb-6 rounded-3xl bg-[#FFB4AB]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[80px] text-[#FFB4AB]">error</span>
</div>

<p class="text-[16px] font-normal text-[#C5BCE0] leading-relaxed">

            </p>
</div>

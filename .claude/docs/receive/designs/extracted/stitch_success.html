<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Receive Crypto | KMPilot Gold</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: '#0F0D09',
                        surface: '#1C1910',
                        'surface-variant': '#302B1C',
                        'on-surface': '#EDE8D5',
                        'on-surface-variant': '#C4BA94',
                        outline: '#726A48',
                        'outline-variant': '#3F3822',
                        primary: '#F5D76E',
                        'on-primary': '#2C1900',
                        'primary-container': '#4A3200',
                        'on-primary-container': '#FFF0C0',
                        error: '#FFB4AB',
                        'on-error': '#690005',
                        'error-container': '#93000A',
                        'on-error-container': '#FFDAD6',
                    },
                    borderRadius: {
                        'DEFAULT': '0.5rem',
                        'lg': '1rem',
                        'xl': '1.5rem',
                        '2xl': '20px',
                        'full': '9999px'
                    },
                    fontFamily: {
                        headline: ['Manrope', 'sans-serif'],
                        display: ['Manrope', 'sans-serif'],
                        body: ['Manrope', 'sans-serif'],
                        label: ['Manrope', 'sans-serif'],
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; background-color: #0F0D09; color: #EDE8D5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .qr-gradient-halo {
            background: radial-gradient(circle, rgba(245, 215, 110, 0.15) 0%, rgba(15, 13, 9, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex items-center px-4 h-16 bg-transparent">
<button class="flex items-center justify-center w-10 h-10 rounded-full active:scale-90 transition-transform" style="color: #F5D76E;">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-2 font-bold tracking-tight text-[#EDE8D5] text-xl" style="letter-spacing: -0.025em;">Receive</h1>
<div class="ml-auto w-10 h-10"></div>
</header>
<main class="flex-1 mt-16 px-4 pb-32">
<!-- Asset Selector -->
<section class="mt-6">
<button class="w-full bg-surface border border-outline rounded-full p-3 flex items-center justify-between hover:bg-surface-variant transition-colors active:scale-[0.98]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-[#F7931A] flex items-center justify-center shadow-lg">
<span class="text-white font-bold text-xl">₿</span>
</div>
<div class="flex flex-col items-start">
<span class="font-bold text-[#EDE8D5] text-sm">Bitcoin</span>
<span class="text-[#C4BA94] text-xs">Bitcoin Network</span>
</div>
</div>
<span class="material-symbols-outlined text-outline pr-2" data-icon="expand_more">expand_more</span>
</button>
</section>
<!-- QR Code Card -->
<section class="mt-6 relative">
<div class="bg-surface border border-primary rounded-2xl p-8 flex flex-col items-center relative overflow-hidden">
<!-- Subtle Glow effect -->
<span class="text-[#C4BA94] text-sm mb-6 font-medium">Your Bitcoin address</span>
<!-- QR Code Tile -->
<!-- Address Pill -->
<div class="w-full bg-surface-variant border border-outline rounded-xl px-4 py-3 flex items-center justify-between group active:bg-outline-variant transition-colors">
<span class="font-mono text-xs text-[#EDE8D5] tracking-tight">bc1qxy2kgf86gnvkv0u9vnm7p9nq3f9z6n77h0wlh</span>
<span class="material-symbols-outlined text-primary text-xl" data-icon="content_copy">content_copy</span>
</div>
</div>
</section>
<!-- Network Warning -->
<section class="mt-6">
<div class="bg-error-container/20 border border-error/40 rounded-xl p-4 flex gap-3">
<span class="material-symbols-outlined text-error shrink-0" data-icon="warning">warning</span>
<div class="flex flex-col gap-1">
<p class="font-bold text-[#EDE8D5] text-sm">Only send Bitcoin (BTC)</p>
<p class="text-[#C4BA94] text-xs leading-relaxed">Sending any other asset to this address may result in permanent loss.</p>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-[#1C1910] rounded-t-2xl shadow-[0_-4px_24px_rgba(0,0,0,0.6)] px-4 pt-4 pb-8 border-t border-[#726A48]/30">
<div class="flex gap-4">
<button class="flex-1 h-14 bg-surface-variant border border-outline rounded-xl flex items-center justify-center gap-2 text-[#EDE8D5] font-semibold active:scale-95 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="share">share</span>
                Share
            </button>
<button class="flex-1 h-14 bg-primary rounded-xl flex items-center justify-center gap-2 text-on-primary font-bold active:scale-95 transition-transform shadow-[0_4px_12px_rgba(245,215,110,0.2)]">
<span class="material-symbols-outlined text-xl" data-icon="content_copy" style="font-variation-settings: 'FILL' 1;">content_copy</span>
                Copy Address
            </button>
</div>
</footer>
<!-- Bottom Navigation Shell (Inactive for task-focused screen) -->
<!-- Suppressed to prioritize the "Receive" focused journey -->
</body></html>
